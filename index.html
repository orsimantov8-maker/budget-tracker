function addEntry() {
  const date = document.getElementById('f-date').value;
  const card = document.getElementById('f-card').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  const cat = document.getElementById('f-cat').value;
  const biz = document.getElementById('f-biz').value;
  const note = document.getElementById('f-note').value;
  if (!date || !amount || !biz) { alert('נא למלא תאריך, סכום ובית עסק'); return; }
  const d = new Date(date);
  const fdate = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
  entries.unshift({ date:fdate, card, cat, amount, biz, note });
  document.getElementById('f-amount').value = '';
  document.getElementById('f-biz').value = '';
  document.getElementById('f-note').value = '';
  buildCats(); calcTotal(); selectCard(null, currentCard);
  switchTab('summary');

function calcTotal() {
  const raw = parseInt(document.getElementById('opening-val').value) || 0;
  const hint = document.getElementById('opening-hint');
  const totalEl = document.getElementById('total-actual');
  const subEl = document.getElementById('total-sub');
  const remainEl = document.getElementById('remain-sub');
  if (raw < 0) { hint.textContent='חוסר ₪'+Math.abs(raw).toLocaleString(); hint.style.color='#f87171'; subEl.textContent='כולל חוסר פתיחה'; subEl.style.color='#f87171'; }
  else if (raw > 0) { hint.textContent='עודף ₪'+raw.toLocaleString(); hint.style.color='#34d399'; subEl.textContent='בניכוי עודף פתיחה'; subEl.style.color='#34d399'; }
  else { hint.textContent='ללא יתרה'; hint.style.color='#6b7280'; subEl.textContent=''; }
  const total = entries.reduce((s,e)=>s+e.amount,0) - raw;
  totalEl.textContent = '₪' + total.toLocaleString();
  const budgeted = entries.filter(e=>BUDGETS[e.cat]).reduce((s,e)=>s+e.amount,0);
  const remain = 4500 - budgeted;
  remainEl.textContent = remain>=0 ? 'נשאר ₪'+remain.toLocaleString() : 'חריגה ₪'+Math.abs(remain).toLocaleString();
  remainEl.style.color = remain>=0 ? '#34d399' : '#f87171';
}

  ALL_CATS.forEach((catName,i) => {
    const catEntries = entries.filter(e=>e.cat===catName);
    const actual = catEntries.reduce((s,e)=>s+e.amount,0);
    const hasBudget = !!BUDGETS[catName];
    const budget = BUDGETS[catName]||0;
    const color = CAT_COLORS[catName];
    const div = document.createElement('div');
    div.className = 'cat-row';
    let progressHTML = '', remainHTML = '';
    if (hasBudget) {
      const pct = Math.min(100, Math.round(actual/budget*100));
      const remaining = budget - actual;
      const bc = pct>=90?'#f87171':pct>=70?'#fbbf24':'#34d399';
      progressHTML = `<div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${bc};"></div></div>`;
      remainHTML = `<div style="font-size:12px;color:${remaining>=0?'#34d399':'#f87171'};">${remaining>=0?'נשאר':'חריגה'} ₪${Math.abs(remaining).toLocaleString()}</div>`;
    }
    div.innerHTML = `
      <div class="cat-top">
        <div class="cat-name"><span class="dot" style="background:${color};box-shadow:0 0 6px ${color}44;"></span>${catName}</div>
        <div class="cat-amounts">${hasBudget?`₪${actual.toLocaleString()} <span>/ ₪${budget.toLocaleString()}</span>`:`₪${actual.toLocaleString()}`}</div>
      </div>${progressHTML}${remainHTML}`;
    const detail = document.createElement('div');
    detail.className = 'cat-detail';
    detail.id = 'det-'+i;
    if (catEntries.length===0) {
      detail.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:#4b5563;">אין עסקאות</div>';
    } else {
      const rows = catEntries.map(t=>`<tr><td>${t.date}</td><td style="color:${color};">${catName}</td><td>${t.amount<0?'<span style="color:#34d399;">':''}₪${t.amount.toLocaleString()}${t.amount<0?'</span>':''}</td><td>${t.biz}</td><td style="color:#4b5563;">${t.note||'—'}</td></tr>`).join('');
      detail.innerHTML = `<table><thead><tr><th>תאריך</th><th>קטגוריה</th><th>סכום</th><th>בית עסק</th><th>הערות</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
    div.onclick = () => { const d=document.getElementById('det-'+i); d.style.display=d.style.display==='block'?'none':'block'; };
    list.appendChild(div); list.appendChild(detail);
  });
}

function switchTab(name) {
  ['summary','entry','cards'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById(n).classList.toggle('active',n===name);
  });
}

function selectCard(el, name) {
  if(el){document.querySelectorAll('.card-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
  currentCard = name;
  const cardEntries = entries.filter(e=>e.card===name);
  const total = cardEntries.reduce((s,e)=>s+e.amount,0);
  document.getElementById('card-total').textContent = '₪'+total.toLocaleString();
  document.getElementById('card-count').textContent = cardEntries.length;
  const tbody = document.getElementById('card-table');
  tbody.innerHTML = cardEntries.length===0
    ? '<tr><td colspan="5" class="empty-state">אין עסקאות</td></tr>'
    : cardEntries.map(r=>`<tr><td>${r.date}</td><td style="color:${CAT_COLORS[r.cat]};">${r.cat}</td><td>${r.amount<0?'<span style="color:#34d399;">':''}₪${r.amount.toLocaleString()}${r.amount<0?'</span>':''}</td><td>${r.biz}</td><td style="color:#4b5563;">${r.note||'—'}</td></tr>`).join('');
}

buildCats(); calcTotal(); selectCard(null, currentCard);
</script>
